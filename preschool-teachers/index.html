<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선생님 전용 시크릿 툴 🐣</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header id="header">
        <div class="container">
            <div class="logo">
                <a href="#"><span>Hago</span>nie <span class="badge">for Teachers</span></a>
            </div>
            <nav class="nav-menu">
                <ul>
                    <li><a href="#about" class="nav-link">환영해요!</a></li>
                    <li><a href="#projects" class="nav-link">비밀 도구함</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section id="hero" class="hero-section">
        <div class="hero-content">
            <div class="chick-icon bounce">🐣</div>
            <h1 class="hero-title">선생님의 퇴근을 30분 앞당겨 줄<br><span class="highlight">삐약반 스마트 툴 모음</span></h1>
            <p class="hero-subtitle">가장 효율적이고 쉬운 도구들로 퇴근 요정이 되어드릴게요!</p>
            <a href="#projects" class="cta-button">비밀 도구함 열기 ✨</a>
        </div>
        <!-- Decorative Clouds -->
        <div class="decoration cloud-1"></div>
        <div class="decoration cloud-2"></div>
        <div class="decoration cloud-3"></div>
    </section>

    <!-- Projects / Tools Section -->
    <section id="projects" class="projects-section">
        <div class="container">
            <div class="section-title">
                <h2>비밀 도구함 🎒</h2>
                <div class="underline"></div>
            </div>
            <div class="grid-container">
                <!-- Project Card 1: Requested Tool -->
                <div class="card bounce-card">
                    <div class="card-img-placeholder yellow-bg">
                        <span class="pulse">📁</span>
                    </div>
                    <div class="card-content">
                        <h3>문서/사진파일 변환하기</h3>
                        <p>pdf ➔ jpg, 이미지 포맷 변환 등 골치 아픈 문서와 사진 파일들을 클릭 한 번에 원하는 대로 바꿔드려요!</p>
                        <a href="#" class="card-link" onclick="alert('삐약삐약! 🐣 이 기능은 현재 열심히 제작 중입니다. 조금만 기다려주세요!')">바로가기 &rarr;</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2026 Hagonie for Teachers. All rights reserved.</p>
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="js/script.js"></script>
</body>
</html>
